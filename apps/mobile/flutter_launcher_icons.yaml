# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"

  android: "ic_launcher"
  min_sdk_android: 21
  remove_alpha_ios: true

  ios: true

  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"

  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 48 # min:48, max:256, default: 48

  macos:
    generate: true
    image_path: "assets/images/app_icon.png"
